<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" fill="none">
  <!-- Teal otter (left) — head -->
  <ellipse cx="14" cy="11" rx="7" ry="7.5" fill="#2D6E70"/>
  <!-- Teal otter ear -->
  <ellipse cx="9.5" cy="6" rx="3" ry="2.5" fill="#2D6E70"/>
  <!-- Teal otter eye -->
  <circle cx="11.5" cy="10" r="1.3" fill="#1B4243"/>
  <circle cx="12" cy="9.6" r="0.45" fill="#E8F1F1"/>
  <!-- Teal otter nose -->
  <ellipse cx="9.5" cy="13" rx="1.5" ry="1" fill="#1B4243"/>
  <!-- Teal otter body -->
  <ellipse cx="15" cy="25" rx="8.5" ry="12" fill="#2D6E70"/>
  <!-- Teal otter belly patch -->
  <ellipse cx="14.5" cy="25.5" rx="5" ry="7.5" fill="#6FA3A5" opacity="0.45"/>

  <!-- Rust otter (right) — head -->
  <ellipse cx="42" cy="11" rx="7" ry="7.5" fill="#C17A3F"/>
  <!-- Rust otter ear -->
  <ellipse cx="46.5" cy="6" rx="3" ry="2.5" fill="#C17A3F"/>
  <!-- Rust otter eye -->
  <circle cx="44.5" cy="10" r="1.3" fill="#7F4D25"/>
  <circle cx="45" cy="9.6" r="0.45" fill="#FAEFE5"/>
  <!-- Rust otter nose -->
  <ellipse cx="46.5" cy="13" rx="1.5" ry="1" fill="#7F4D25"/>
  <!-- Rust otter body -->
  <ellipse cx="41" cy="25" rx="8.5" ry="12" fill="#C17A3F"/>
  <!-- Rust otter belly patch -->
  <ellipse cx="41.5" cy="25.5" rx="5" ry="7.5" fill="#D99A66" opacity="0.45"/>

  <!-- Teal tail curves down-right to the circle -->
  <path d="M 15 37 C 15 43 20 46 28 46" stroke="#2D6E70" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Rust tail curves down-left to the circle -->
  <path d="M 41 37 C 41 43 36 46 28 46" stroke="#C17A3F" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- The tail-O circle — this IS the O in Otter -->
  <circle cx="28" cy="46" r="6.5" stroke="#5C3A28" stroke-width="2.5" fill="#FAF6EE"/>
  <!-- Small paw prints inside the O for personality -->
  <circle cx="26.5" cy="45" r="0.9" fill="#5C3A28" opacity="0.5"/>
  <circle cx="29.5" cy="45" r="0.9" fill="#5C3A28" opacity="0.5"/>
  <circle cx="28" cy="47.5" r="0.9" fill="#5C3A28" opacity="0.5"/>
</svg>
