<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Budget — Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #f8fafc;
      flex: 1;
    }

    header span {
      font-size: 0.75rem;
      color: #64748b;
    }

    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 57px);
    }

    .login-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }

    .login-card h2 {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #f8fafc;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      color: #94a3b8;
      margin-bottom: 0.4rem;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 8px;
      padding: 0.6rem 0.875rem;
      color: #f1f5f9;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus, input[type="password"]:focus {
      border-color: #6366f1;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 0.625rem 1.25rem;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: #6366f1;
      color: #fff;
      width: 100%;
    }

    .btn-sm {
      background: #334155;
      color: #94a3b8;
      padding: 0.35rem 0.75rem;
      font-size: 0.75rem;
    }

    #error-msg {
      color: #f87171;
      font-size: 0.8125rem;
      margin-top: 0.75rem;
      min-height: 1.2em;
    }

    #dashboard { display: none; padding: 2rem; }

    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 1rem;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .stat-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #f8fafc;
      line-height: 1;
      margin-bottom: 0.35rem;
    }

    .stat-card .label {
      font-size: 0.75rem;
      color: #64748b;
    }

    /* Chart */
    .chart-wrap {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .chart-wrap canvas { max-height: 220px; }

    /* Users table */
    .table-wrap {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 2.5rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
    }

    thead { background: #0f172a; }

    th {
      text-align: left;
      padding: 0.75rem 1rem;
      font-weight: 600;
      color: #64748b;
      white-space: nowrap;
    }

    td {
      padding: 0.7rem 1rem;
      border-top: 1px solid #1e293b;
      color: #cbd5e1;
      vertical-align: middle;
    }

    tbody tr { background: #1e293b; }
    tbody tr:nth-child(even) { background: #182030; }
    tbody tr:hover { background: #263348; }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .badge-green { background: #14532d; color: #86efac; }
    .badge-gray  { background: #1e293b; color: #475569; border: 1px solid #334155; }

    .refresh-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    #last-updated { font-size: 0.75rem; color: #475569; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #334155;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-row td {
      text-align: center;
      padding: 2rem;
      color: #475569;
    }
  </style>
</head>
<body>

<header>
  <h1>Family Budget &mdash; Admin Dashboard</h1>
  <span id="connection-label"></span>
  <button class="btn-sm" id="logout-btn" style="display:none">Sign out</button>
</header>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h2>Admin Login</h2>

    <label for="worker-url">Worker URL</label>
    <input type="text" id="worker-url"
           value="https://family-budget-api.bob-31b.workers.dev"
           placeholder="https://your-worker.workers.dev" />

    <label for="admin-key">Admin Key</label>
    <input type="password" id="admin-key" placeholder="Paste your ADMIN_KEY here" />

    <button class="btn-primary" id="login-btn">Connect</button>
    <div id="error-msg"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="refresh-row">
    <span class="section-title" style="margin:0">Overview</span>
    <div style="display:flex;align-items:center;gap:0.75rem">
      <span id="last-updated"></span>
      <button class="btn-sm" id="refresh-btn">Refresh</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card"><div class="value">—</div><div class="label">Loading…</div></div>
  </div>

  <!-- Signups chart -->
  <div class="chart-wrap">
    <div class="section-title" style="margin-bottom:1rem">Signups by Day</div>
    <canvas id="signups-chart"></canvas>
  </div>

  <!-- Users table -->
  <div class="section-title">Users</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Joined</th>
          <th>Household</th>
          <th>Spends</th>
          <th>Bills</th>
          <th>Goals</th>
        </tr>
      </thead>
      <tbody id="users-tbody">
        <tr class="loading-row"><td colspan="7"><span class="spinner"></span>Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  let WORKER_URL = "";
  let ADMIN_KEY  = "";
  let signupsChart = null;

  const $ = id => document.getElementById(id);

  // ── Auth ──────────────────────────────────────────────────────────────────

  $("login-btn").addEventListener("click", async () => {
    const url = $("worker-url").value.trim().replace(/\/$/, "");
    const key = $("admin-key").value.trim();
    $("error-msg").textContent = "";

    if (!url || !key) {
      $("error-msg").textContent = "Both fields are required.";
      return;
    }

    $("login-btn").disabled = true;
    $("login-btn").textContent = "Connecting…";

    try {
      const res = await fetch(`${url}/api/admin/stats`, {
        headers: { "X-Admin-Key": key }
      });

      if (res.status === 401) {
        $("error-msg").textContent = "Wrong admin key.";
        return;
      }
      if (!res.ok) {
        $("error-msg").textContent = `Server error ${res.status}.`;
        return;
      }

      WORKER_URL = url;
      ADMIN_KEY  = key;

      $("login-screen").style.display  = "none";
      $("dashboard").style.display     = "block";
      $("logout-btn").style.display    = "";
      $("connection-label").textContent = new URL(url).hostname;

      await loadAll();

    } catch (e) {
      $("error-msg").textContent = "Could not reach worker. Check the URL and try again.";
    } finally {
      $("login-btn").disabled = false;
      $("login-btn").textContent = "Connect";
    }
  });

  $("admin-key").addEventListener("keydown", e => {
    if (e.key === "Enter") $("login-btn").click();
  });

  $("logout-btn").addEventListener("click", () => {
    WORKER_URL = ""; ADMIN_KEY = "";
    $("admin-key").value = "";
    $("login-screen").style.display = "flex";
    $("dashboard").style.display    = "none";
    $("logout-btn").style.display   = "none";
    $("connection-label").textContent = "";
  });

  $("refresh-btn").addEventListener("click", loadAll);

  // ── Data loading ──────────────────────────────────────────────────────────

  async function apiFetch(path) {
    const res = await fetch(`${WORKER_URL}${path}`, {
      headers: { "X-Admin-Key": ADMIN_KEY }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function loadAll() {
    $("refresh-btn").disabled = true;
    $("refresh-btn").textContent = "Refreshing…";
    try {
      await Promise.all([loadStats(), loadUsers()]);
      $("last-updated").textContent = "Updated " + new Date().toLocaleTimeString();
    } catch (e) {
      console.error(e);
    } finally {
      $("refresh-btn").disabled = false;
      $("refresh-btn").textContent = "Refresh";
    }
  }

  async function loadStats() {
    const data = await apiFetch("/api/admin/stats");
    renderStats(data.stats);
    renderChart(data.signups_by_day ?? []);
  }

  function renderStats(stats) {
    const items = [
      { label: "Total Users",            value: stats.total_users },
      { label: "Households",             value: stats.total_households },
      { label: "Multi-member",           value: stats.multi_member_households },
      { label: "Spends",                 value: stats.total_spends },
      { label: "Bills",                  value: stats.total_bills },
      { label: "Goals",                  value: stats.total_goals },
      { label: "Debts",                  value: stats.total_debts },
      { label: "Calendar Events",        value: stats.total_events },
      { label: "Active Sessions",        value: stats.active_sessions },
    ];

    $("stats-grid").innerHTML = items.map(i => `
      <div class="stat-card">
        <div class="value">${i.value ?? "—"}</div>
        <div class="label">${i.label}</div>
      </div>
    `).join("");
  }

  function renderChart(rows) {
    const labels = rows.map(r => r.day);
    const values = rows.map(r => r.signups);

    if (signupsChart) {
      signupsChart.data.labels = labels;
      signupsChart.data.datasets[0].data = values;
      signupsChart.update();
      return;
    }

    const ctx = $("signups-chart").getContext("2d");
    signupsChart = new Chart(ctx, {
      type: "bar",
      data: {
        labels,
        datasets: [{
          label: "Signups",
          data: values,
          backgroundColor: "#6366f1",
          borderRadius: 4,
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { title: items => items[0].label } }
        },
        scales: {
          x: {
            ticks: { color: "#64748b", maxRotation: 45 },
            grid:  { color: "#1e293b" }
          },
          y: {
            ticks: { color: "#64748b", stepSize: 1 },
            grid:  { color: "#334155" },
            beginAtZero: true
          }
        }
      }
    });
  }

  async function loadUsers() {
    const data = await apiFetch("/api/admin/users");
    renderUsers(data.users ?? []);
  }

  function renderUsers(users) {
    if (!users.length) {
      $("users-tbody").innerHTML = `<tr class="loading-row"><td colspan="7">No users found.</td></tr>`;
      return;
    }

    $("users-tbody").innerHTML = users.map(u => {
      const joined = u.created_at
        ? new Date(u.created_at).toLocaleDateString(undefined, { year:"numeric", month:"short", day:"numeric" })
        : "—";

      const household = u.household_name
        ? escHtml(u.household_name)
        : `<span style="color:#475569">—</span>`;

      const bills = u.has_bills
        ? `<span class="badge badge-green">Yes</span>`
        : `<span class="badge badge-gray">No</span>`;

      return `<tr>
        <td>${escHtml(u.name ?? "")}</td>
        <td style="color:#94a3b8">${escHtml(u.email ?? "")}</td>
        <td style="color:#64748b;white-space:nowrap">${joined}</td>
        <td>${household}</td>
        <td>${u.spend_count ?? 0}</td>
        <td>${bills}</td>
        <td>${u.goal_count ?? 0}</td>
      </tr>`;
    }).join("");
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
</script>
</body>
</html>
